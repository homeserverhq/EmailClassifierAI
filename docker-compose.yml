version: '3.8'

services:
  redis:
    image: "redis:alpine"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  worker:
    build: .
    command: /bin/bash /app/launcher.sh celery -A tasks worker --loglevel=warning --concurrency=4
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - API_KEY=${API_KEY}
      - API_BASE=${API_BASE}
      - MODEL_NAME=${MODEL_NAME}
    volumes:
      - db_data:/data
    depends_on:
      - redis

  monitor:
    build: .
    command: /bin/bash /app/launcher.sh python monitor.py
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - db_data:/data
    depends_on:
      - redis

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:5000 web_ui:app
    ports:
      - "4080:5000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - API_KEY=${API_KEY}
      - API_BASE=${API_BASE}
      - MODEL_NAME=${MODEL_NAME}
      - FLASK_SECRET=${FLASK_SECRET}
    volumes:
      - db_data:/data
    depends_on:
      - redis

volumes:
  db_data:
